<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - QuickServe</title>
  <link href="/frontend/assets/css/style.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">QuickServe</a>
      <div class="nav-links">
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </div>
    </nav>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <h2>Login</h2>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
          <label>
            <input type="radio" name="userType" value="user" checked> User
          </label>
          <label>
            <input type="radio" name="userType" value="quickpro"> QuickPro
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>
      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
