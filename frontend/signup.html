<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up - QuickServe</title>
  <link href="/frontend/assets/css/style.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="logo">QuickServe</a>
      <div class="nav-links">
        <a href="login.html" class="btn btn-outline">Login</a>
      </div>
    </nav>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <h2>Sign Up</h2>
      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="userType" value="user" checked> User
            </label>
            <label>
              <input type="radio" name="userType" value="quickpro"> QuickPro
            </label>
          </div>
        </div>
        <div id="proFields" class="hidden">
          <div class="form-group">
            <label for="profession">Profession</label>
            <select id="profession" name="profession">
              <option value="electrician">Electrician</option>
              <option value="plumber">Plumber</option>
              <option value="mechanic">Mechanic</option>
            </select>
          </div>
          <div class="form-group">
            <label for="experience">Years of Experience</label>
            <input type="number" id="experience" name="experience" min="0">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
      </form>
      <p class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
